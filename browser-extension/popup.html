<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 350px;
      padding: 15px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: #eee;
    }
    h1 {
      font-size: 18px;
      margin: 0 0 15px 0;
      color: #00d4ff;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    h1::before {
      content: "";
      display: inline-block;
      width: 24px;
      height: 24px;
      background: linear-gradient(135deg, #00d4ff, #0066ff);
      border-radius: 4px;
    }
    .controls {
      display: flex;
      gap: 10px;
      margin-bottom: 15px;
    }
    button {
      flex: 1;
      padding: 10px 15px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
      font-size: 13px;
      transition: all 0.2s;
    }
    #recordBtn {
      background: #00d4ff;
      color: #000;
    }
    #recordBtn:hover {
      background: #00b8e6;
    }
    #recordBtn.recording {
      background: #ff4757;
      animation: pulse 1s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }
    #clearBtn {
      background: #333;
      color: #fff;
    }
    #clearBtn:hover {
      background: #444;
    }
    #copyBtn {
      background: #2ed573;
      color: #000;
    }
    #copyBtn:hover {
      background: #26c066;
    }
    .status {
      padding: 8px 12px;
      border-radius: 4px;
      margin-bottom: 15px;
      font-size: 12px;
    }
    .status.idle {
      background: #333;
    }
    .status.recording {
      background: #ff475733;
      border: 1px solid #ff4757;
    }
    .actions-count {
      font-size: 12px;
      color: #888;
      margin-bottom: 10px;
    }
    #codeOutput {
      width: 100%;
      height: 200px;
      background: #0f0f1a;
      border: 1px solid #333;
      border-radius: 6px;
      color: #00d4ff;
      font-family: 'Monaco', 'Menlo', monospace;
      font-size: 11px;
      padding: 10px;
      resize: vertical;
      box-sizing: border-box;
    }
    .footer {
      margin-top: 10px;
      font-size: 11px;
      color: #666;
      text-align: center;
    }
    .footer a {
      color: #00d4ff;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <h1>axterminator Recorder</h1>

  <div class="status idle" id="status">Ready to record</div>

  <div class="controls">
    <button id="recordBtn">Start Recording</button>
    <button id="clearBtn">Clear</button>
  </div>

  <div class="actions-count" id="actionsCount">0 actions recorded</div>

  <textarea id="codeOutput" readonly placeholder="Generated code will appear here..."></textarea>

  <div class="controls">
    <button id="copyBtn">Copy Code</button>
  </div>

  <div class="footer">
    <a href="https://github.com/MikkoParkkola/axterminator" target="_blank">axterminator</a> - macOS GUI Testing
  </div>

  <script src="popup.js"></script>
</body>
</html>
