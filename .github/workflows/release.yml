name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  build-rust:
    name: Build Rust ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS Apple Silicon (ARM64)
          - os: macos-14
            target: aarch64-apple-darwin
          # macOS Intel (x86_64)
          - os: macos-15
            target: x86_64-apple-darwin

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --features cli --target ${{ matrix.target }}

      - name: Fix Python dynamic linkage
        run: |
          BINARY="target/${{ matrix.target }}/release/axterminator"
          # Find the absolute Python framework path baked into the binary
          PYTHON_PATH=$(otool -L "$BINARY" | grep -o '/.*Python\.framework/[^ ]*' | head -1)
          if [ -n "$PYTHON_PATH" ]; then
            echo "Rewriting Python linkage: $PYTHON_PATH"
            # Extract the framework-relative portion
            FRAMEWORK_REL=$(echo "$PYTHON_PATH" | sed 's|.*/\(Python\.framework/.*\)|\1|')
            install_name_tool -change "$PYTHON_PATH" "@rpath/$FRAMEWORK_REL" "$BINARY"
            # Add common rpath search locations
            install_name_tool -add_rpath /Library/Frameworks "$BINARY" 2>/dev/null || true
            install_name_tool -add_rpath /usr/local/Frameworks "$BINARY" 2>/dev/null || true
            install_name_tool -add_rpath /opt/homebrew/Frameworks "$BINARY" 2>/dev/null || true
            install_name_tool -add_rpath @executable_path/../Frameworks "$BINARY" 2>/dev/null || true
            echo "Updated linkage:"
            otool -L "$BINARY" | grep -i python || true
          else
            echo "No Python framework linkage found"
          fi

      - name: Rename artifacts
        run: |
          cd target/${{ matrix.target }}/release
          # CLI binary
          if [ -f axterminator ]; then
            cp axterminator axterminator-${{ matrix.target }}
          fi
          # Library
          if [ -f libaxterminator.dylib ]; then
            cp libaxterminator.dylib axterminator-${{ matrix.target }}.dylib
          fi
          if [ -f libaxterminator.rlib ]; then
            cp libaxterminator.rlib axterminator-${{ matrix.target }}.rlib
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: axterminator-${{ matrix.target }}
          path: |
            target/${{ matrix.target }}/release/axterminator-${{ matrix.target }}
            target/${{ matrix.target }}/release/axterminator-${{ matrix.target }}.*

  build-python:
    name: Build Python wheel ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
          - os: macos-15
            target: x86_64-apple-darwin

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install maturin
        run: pip install maturin

      - name: Build wheel
        run: maturin build --release --target ${{ matrix.target }}

      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: wheel-${{ matrix.target }}
          path: target/wheels/*.whl

  release:
    name: Create GitHub Release
    needs: [build-rust, build-python]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release files
        run: |
          mkdir -p release
          find artifacts -type f \( -name "*.dylib" -o -name "*.rlib" -o -name "*.whl" -o -name "axterminator-*-apple-darwin" \) -exec cp {} release/ \;
          cd release
          ls -la
          sha256sum * > checksums-sha256.txt || shasum -a 256 * > checksums-sha256.txt
          cat checksums-sha256.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release/*

  publish-crates-io:
    name: Publish to crates.io
    needs: [build-rust]
    runs-on: macos-14
    environment:
      name: crates-io
      url: https://crates.io/crates/axterminator
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Publish to crates.io
        run: cargo publish --features cli
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  publish-pypi:
    name: Publish to PyPI
    needs: [build-python]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/axterminator
    permissions:
      id-token: write  # Trusted publishing

    steps:
      - name: Download wheel artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: wheel-*
          path: dist
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/

  update-homebrew:
    name: Update Homebrew tap
    needs: [release]
    runs-on: ubuntu-latest
    environment:
      name: homebrew
      url: https://github.com/MikkoParkkola/homebrew-tap
    permissions:
      contents: write

    steps:
      - name: Checkout homebrew-tap
        uses: actions/checkout@v4
        with:
          repository: MikkoParkkola/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      - name: Update formula
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          URL="https://github.com/MikkoParkkola/axterminator/archive/refs/tags/${GITHUB_REF_NAME}.tar.gz"
          SHA256=$(curl -sL "$URL" | sha256sum | cut -d' ' -f1)

          cat > Formula/axterminator.rb << FORMULA
          class Axterminator < Formula
            desc "Background-first macOS GUI automation with MCP server support"
            homepage "https://github.com/MikkoParkkola/axterminator"
            url "$URL"
            sha256 "$SHA256"
            version "$VERSION"
            license "MIT OR Apache-2.0"

            depends_on :macos
            depends_on "rust" => :build

            def install
              system "cargo", "install",
                "--locked",
                "--features", "cli",
                "--root", prefix,
                "--path", "."
            end

            test do
              assert_match "accessibility", shell_output("#{bin}/axterminator check")
            end
          end
          FORMULA

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/axterminator.rb
          git commit -m "axterminator ${GITHUB_REF_NAME}" || echo "No changes"
          git push
